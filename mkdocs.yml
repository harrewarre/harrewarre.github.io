site_name: harre.dev
site_url: https://harre.dev
site_description: harre.dev - A collection of thoughts and ideas

repo_name: "harrewarre/harre-dev"
repo_url: "https://github.com/harrewarre/harrewarre.github.io"

copyright: Copyright &copy; harre.dev

theme:
  name: material
  favicon: "assets/favicon.ico"
  palette:
    scheme: slate
    primary: black
    accent: yellow
  features:
    - navigation.indexes
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
  icon:
    logo: material/code-block-tags
  custom_dir: overrides

plugins:
  - blog:
      blog_toc: false
      post_url_format: "{slug}"
      post_date_format: "yyyy-MM-dd"
      archive: true
      archive_name: Archive
      archive_date_format: yyyy
      post_excerpt: required
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - tags
  - search
  - social
  - tags

nav:
  - Home: "index.md"
  - Blog:
    - "blog/index.md"
  - About: "about.md"

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
    
extra:
  generator: false
  social:
    - icon: fontawesome/brands/mastodon
      link: https://hachyderm.io/@harre
    - icon: fontawesome/solid/rss
      link: feed_rss_created.xml
  analytics:
    provider: custom
